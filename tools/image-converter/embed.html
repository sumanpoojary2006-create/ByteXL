<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OneCompiler Embed</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      color: #1c2533;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100vh;
      border: 0;
    }

    .error {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 20px;
      text-align: center;
      background: #fff7f7;
      color: #8f1d23;
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <iframe id="oc-editor" title="OneCompiler editor" allow="clipboard-read; clipboard-write"></iframe>
  <script>
    function showError(message) {
      document.body.innerHTML = "";
      const box = document.createElement("div");
      box.className = "error";
      box.textContent = message;
      document.body.appendChild(box);
    }

    function decodePayload() {
      const token = window.location.hash.slice(1);
      if (!token) throw new Error("Missing editor data.");

      const padded = token.replace(/-/g, "+").replace(/_/g, "/").padEnd(Math.ceil(token.length / 4) * 4, "=");
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    try {
      const snippet = decodePayload();
      const language = snippet.language || "python";
      const editor = document.getElementById("oc-editor");
      const params = new URLSearchParams({
        hideNew: "true",
        hideTitle: "true",
        hideLanguageSelection: "true",
        listenToEvents: "true"
      });

      editor.title = "OneCompiler " + language + " editor";
      editor.src = "https://onecompiler.com/embed/" + encodeURIComponent(language) + "?" + params.toString();

      function populateCode() {
        if (!editor.contentWindow) return;
        editor.contentWindow.postMessage({
          eventType: "populateCode",
          language,
          files: [{
            name: snippet.filename || "main.py",
            content: snippet.code || ""
          }]
        }, "https://onecompiler.com");
      }

      editor.addEventListener("load", () => {
        populateCode();
        setTimeout(populateCode, 600);
        setTimeout(populateCode, 1500);
      });
    } catch (error) {
      showError(error.message || "Could not load this editor.");
    }
  </script>
</body>
</html>
